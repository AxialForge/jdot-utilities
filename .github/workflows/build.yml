name: Build & Release (Windows)

on:
  push:
    branches:
      - main # run the tests on every push, so a break shows up before tagging
    tags:
      - "v*" # tag a release: git tag v0.5.0 && git push origin v0.5.0
  pull_request:
    branches:
      - main
  workflow_dispatch: # or run manually from the Actions tab

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write # create the release and upload the .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ — `node --test` needs 21+ to expand the "test/**/*.test.js"
          # glob (the pattern that excludes the Electron-only smoke tests).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate. The Node suite runs the data/OCR/PDF engines; Ghostscript
      # isn't on the runner, so those tests skip themselves rather than fail.
      - name: Run tests
        run: npm test

      # The Electron-hosted suites cover what `npm test` structurally cannot:
      # printToPDF, the offscreen render-window pool, and the network-egress
      # block — all of which need a real BrowserWindow. A v1.0.0 pre-release bug
      # that crashed the app on any 4-file batch passed `npm test` and would have
      # been caught here, so these are now a release gate too. Separate steps so
      # a failure names the suite. The first `npx electron` self-downloads the
      # Electron binary (Electron 43+ has no install script).
      - name: Run Electron PDF tests
        run: npx electron test/electron-pdf.js
      - name: Run Electron ops tests
        run: npx electron test/electron-ops.js
      - name: Run Electron offline tests
        run: npx electron test/electron-offline.js

      - name: Build .exe
        # Only tags build a release; a plain push to main stops after the tests
        # above, which is the fast feedback loop. --publish never: electron-builder
        # only builds; the action below does the GitHub release (otherwise
        # electron-builder tries to publish and demands GH_TOKEN).
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run build:win -- --publish never
        env:
          # Optional code signing. Add these as repository secrets to sign the
          # build; without them electron-builder produces an unsigned .exe.
          #   CSC_LINK             base64 of your .pfx  (or a path to it)
          #   CSC_KEY_PASSWORD     the .pfx password
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: jdot-utilities-windows
          path: dist/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
