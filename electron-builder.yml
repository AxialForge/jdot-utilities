appId: com.jdot.utilities
productName: Jdot Utilities
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json
  - build/icon.ico # also bundled so the runtime BrowserWindow icon resolves
  - "!**/*.map"

# sharp ships native binaries that can't run from inside the asar archive,
# so they must be unpacked. (electron-builder bundles production node_modules
# automatically; dev dependencies are excluded.)
asarUnpack:
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
  # @napi-rs/canvas ships a prebuilt .node (PDF -> Images rendering); like sharp
  # it can't be loaded from inside the asar archive.
  - "**/node_modules/@napi-rs/**"
  # tesseract.js loads a wasm core and spawns a worker script from disk (OCR);
  # both must live outside the asar to resolve.
  - "**/node_modules/tesseract.js/**"
  - "**/node_modules/tesseract.js-core/**"

extraResources:
  # OCR English model (offline — no CDN fetch). ocr.js reads it from resources/tessdata.
  - from: resources/tessdata
    to: tessdata
  # A bundled Ghostscript (Compress / PDF-A) would go here; gs.js also detects an
  # installed copy, so this is optional at package time:
  # - from: resources/bin
  #   to: bin

# To bundle Ghostscript into the .exe (so Compress / PDF-A works with no separate
# install), drop gswin64c.exe + its DLLs in resources/bin/ and add the entry above.

win:
  target:
    - nsis
    - portable
  # Place a 256x256+ icon at build/icon.ico. If absent, electron-builder uses a default.
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Jdot Utilities
