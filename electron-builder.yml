appId: com.jdot.utilities
productName: Jdot Utilities
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json
  - build/icon.ico # also bundled so the runtime BrowserWindow icon resolves
  - "!**/*.map"

# sharp ships native binaries that can't run from inside the asar archive,
# so they must be unpacked. (electron-builder bundles production node_modules
# automatically; dev dependencies are excluded.)
asarUnpack:
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
  # @napi-rs/canvas ships a prebuilt .node (PDF -> Images rendering); like sharp
  # it can't be loaded from inside the asar archive.
  - "**/node_modules/@napi-rs/**"

# When you add tools that shell out to bundled binaries (ffmpeg, etc.),
# drop them in resources/bin/ and uncomment this so they ship with the app:
# extraResources:
#   - from: resources/bin
#     to: bin

win:
  target:
    - nsis
    - portable
  # Place a 256x256+ icon at build/icon.ico. If absent, electron-builder uses a default.
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Jdot Utilities
